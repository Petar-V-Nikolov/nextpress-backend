# Nginx: dev (nextpress-backend)
# Copy to /etc/nginx/sites-available/nextpress-backend-dev.conf and enable.
# Set APP_PORT in this environment's .env (e.g. 9092) or change proxy_pass port below.
# After editing: sudo nginx -t && sudo systemctl reload nginx
#
# SSL (Let's Encrypt): sudo certbot --nginx -d cms-dev.yourdomain.com

server {
    listen 80;
    server_name cms-dev.yourdomain.com;

    location / {
        proxy_pass         http://127.0.0.1:9092;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

